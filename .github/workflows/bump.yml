name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: bump-${{ github.repository }}-${{ inputs.bump }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Calculate new version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(jq -r '.version' package.json)
          NEW=$(CURRENT="$CURRENT" node -e "
            const [M, m, p] = process.env.CURRENT.split('.').map(Number);
            const b = process.env.BUMP;
            if (b === 'major') console.log((M+1)+'.0.0');
            else if (b === 'minor') console.log(M+'.'+(m+1)+'.0');
            else console.log(M+'.'+m+'.'+(p+1));
          ")
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "branch=release/v$NEW" >> $GITHUB_OUTPUT

      - name: Check if branch already exists
        id: branch_check
        env:
          BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and update lockfile
        if: steps.branch_check.outputs.exists == 'false'
        env:
          NEW: ${{ steps.version.outputs.new_version }}
        run: |
          jq --tab --arg v "$NEW" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          bun install

      - name: Configure git
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push release branch
        if: steps.branch_check.outputs.exists == 'false'
        env:
          BRANCH: ${{ steps.version.outputs.branch }}
          NEW: ${{ steps.version.outputs.new_version }}
        run: |
          git checkout -b "$BRANCH"
          git add package.json bun.lock
          git commit -m "chore: release v$NEW"
          git push origin "$BRANCH"

      - name: Ensure autorelease label exists
        if: steps.branch_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autorelease" \
            --color "0075ca" \
            --description "Automated release PR — do not apply manually" \
            --force

      - name: Open release PR
        if: steps.branch_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.version.outputs.new_version }}
          BUMP: ${{ inputs.bump }}
        run: |
          gh pr create \
            --title "chore: release v$NEW" \
            --body "Automated **$BUMP** version bump → \`v$NEW\`" \
            --base main \
            --head "release/v$NEW" \
            --label "autorelease"
