name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check if release commit
        id: guard
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if [[ "$ACTOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.guard.outputs.skip == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Get merged PR bump label
        if: steps.guard.outputs.skip == 'false'
        id: labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -qx "major"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -qx "minor"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Calculate new version
        if: steps.guard.outputs.skip == 'false'
        id: version
        env:
          BUMP: ${{ steps.labels.outputs.bump }}
        run: |
          CURRENT=$(jq -r '.version' package.json)
          NEW=$(CURRENT="$CURRENT" node -e "
            const [M, m, p] = process.env.CURRENT.split('.').map(Number);
            const b = process.env.BUMP;
            if (b === 'major') console.log((M+1)+'.0.0');
            else if (b === 'minor') console.log(M+'.'+(m+1)+'.0');
            else console.log(M+'.'+m+'.'+(p+1));
          ")
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "branch=release/v$NEW" >> $GITHUB_OUTPUT

      - name: Check if bump branch already exists
        if: steps.guard.outputs.skip == 'false'
        id: branch_check
        env:
          BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump package.json version
        if: steps.guard.outputs.skip == 'false' && steps.branch_check.outputs.exists == 'false'
        env:
          NEW: ${{ steps.version.outputs.new_version }}
        run: |
          jq --tab --arg v "$NEW" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Configure git
        if: steps.guard.outputs.skip == 'false' && steps.branch_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push bump branch
        if: steps.guard.outputs.skip == 'false' && steps.branch_check.outputs.exists == 'false'
        env:
          BRANCH: ${{ steps.version.outputs.branch }}
          NEW: ${{ steps.version.outputs.new_version }}
        run: |
          git checkout -b "$BRANCH"
          git add package.json
          git commit -m "chore: release v$NEW"
          git push origin "$BRANCH"

      - name: Ensure autorelease label exists
        if: steps.guard.outputs.skip == 'false' && steps.branch_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autorelease" \
            --color "0075ca" \
            --description "Automated release PR — do not apply manually" \
            --force

      - name: Open release PR
        if: steps.guard.outputs.skip == 'false' && steps.branch_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.version.outputs.new_version }}
          BUMP: ${{ steps.labels.outputs.bump }}
        run: |
          gh pr create \
            --title "chore: release v$NEW" \
            --body "Automated **$BUMP** version bump → \`v$NEW\`" \
            --base main \
            --head "release/v$NEW" \
            --label "autorelease"
